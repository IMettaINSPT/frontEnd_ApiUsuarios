<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout('Asaltos', ~{::section})}">

<section class="container">
            <h1>Crear Asalto</h1>
            <p>Completá los datos del nuevo asalto</p>
            <br>

            <div class="card">
                <form th:action="@{/asaltos}" method="post" th:object="${form}">
                    <div style="display:grid; gap:12px; max-width:560px;">

                        <div th:if="${#fields.hasGlobalErrors()}" class="error">
                            <p th:each="e : ${#fields.globalErrors()}"
                               th:text="${e.defaultMessage}"></p>
                        </div>

                        <div>
                            <label>Código</label>
                            <input type="text" th:field="*{codigo}">
                        </div>

                        <div>
                            <label>Fecha</label>
                            <input type="date" th:field="*{fechaAsalto}">
                            <div th:if="${#fields.hasErrors('fechaAsalto')}"
                                 th:text="${#fields.errors('fechaAsalto')[0]}" style="color:#ffb4b4;"></div>
                        </div>

                        <div>
                            <label>Sucursal</label>
                            <select th:field="*{sucursalId}">
                                <option value="">-- Seleccionar --</option>
                                <option th:each="s : ${sucursales}"
                                        th:value="${s.id}"
                                        th:text="${s.codigo + ' - ' + s.domicilio}">1</option>
                            </select>
                            <div th:if="${#fields.hasErrors('sucursalId')}"
                                 th:text="${#fields.errors('sucursalId')[0]}" style="color:#ffb4b4;"></div>
                        </div>


                        <div>
                            <label>Personas Detenidas</label>
                            <p style="font-size: 0.8rem; color: #ccc; margin-bottom: 4px;">
                                (Mantené presionado Ctrl para seleccionar varias personas)
                            </p>

                            <select th:field="*{personaDetenidaIds}" multiple class="form-select" style="height: 120px;">
                                <option th:each="p : ${personas}"
                                        th:value="${p.id}"
                                        th:text="${p.codigo + ' - ' + p.nombre + ' - ' + p.apellido}">1</option>
                            </select>

                            <div th:if="${#fields.hasErrors('personaDetenidaIds')}"
                                 th:text="${#fields.errors('personaDetenidaIds')[0]}"
                                 style="color:#ffb4b4; margin-top: 4px;">
                            </div>
                        </div>


                        <div th:if="${!(haySucursales && hayPersonas)}" style="color:#ffb4b4; font-weight:800;">
                            No hay sucursales o personas disponibles para crear un asalto.
                        </div>

                        <div style="display:flex; gap:10px; flex-wrap:wrap; margin-top:8px;">
                            <button class="btn btn-primary" type="submit" th:disabled="${!(haySucursales && hayPersonas)}">
                                Guardar
                            </button>
                            <a class="btn" th:href="@{/asaltos}">Cancelar</a>
                        </div>

                    </div>
                </form>
            </div>
        </section>
</html>
