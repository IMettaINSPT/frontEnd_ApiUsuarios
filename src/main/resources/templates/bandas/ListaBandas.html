<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout('Bandas', ~{::section})}">

<section class="container">
    <h1>Bandas</h1>

    <div class="card actions">
        <a class="btn btn-primary" th:href="@{/bandas/new}"> Crear Banda</a>
    </div>

    <div class="card">
        <table>
            <thead>
            <tr>
                <th>Número de Banda</th><th>Número de Miembros</th><th>Persona Detenida</th><th>Acciones</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="b : ${items}">

                <td th:text="${b.numeroBanda}">NUM_BANDA</td>
                <td th:text="${b.numeroMiembros}">NUM_MIEMBROS</td>

                <td>
                    <select th:if="${not #lists.isEmpty(b.personasDetenidas)}" class="form-select form-select-sm">
                        <option selected>Ver personas detenidas asociadas ([[${#lists.size(b.personasDetenidas)}]])</option>
                        <option th:each="p : ${b.personasDetenidas}"
                                th:text="${p.codigo + ' - ' + p.nombre+ ' - ' + p.apellido}">
                        </option>
                    </select>
                    <span th:if="${#lists.isEmpty(b.personasDetenidas)}" class="muted">Sin personas detenidas</span>
                </td>




                 <td class="td-actions">
                    <a class="btn" th:href="@{/bandas/{id}(id=${b.id})}">Ver/Editar</a>
                    <a class="btn btn-danger" th:href="@{/bandas/{id}/confirm-delete(id=${b.id})}">Borrar</a>
                </td>
            </tr>
            <tr th:if="${items == null || #lists.isEmpty(items)}">
                <td colspan="3" class="muted">No hay bandas.</td>
            </tr>
            </tbody>
        </table>
    </div>
</section>
</html>
