<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout('Crear Banda', ~{::section})}">

<section class="container">
    <h1>Crear Banda</h1>

    <div class="card">
        <form th:action="@{/bandas}" method="post" th:object="${form}" class="form">
            <div th:if="${#fields.hasGlobalErrors()}" class="error">
                <div th:each="e : ${#fields.globalErrors()}" th:text="${e}"></div>
            </div>

            <div>
                <label>Número de Banda</label>
                <input type="number" th:field="*{numeroBanda}" placeholder="Solo números">
                <div class="error" th:if="${#fields.hasErrors('numeroBanda')}" th:errors="*{numeroBanda}"></div>
            </div>

            <div>
                <label>Número de Miembros</label>
                <input type="number" th:field="*{numeroMiembros}" min="2" max="500" placeholder="Rango 2 a 500">
                <div class="error" th:if="${#fields.hasErrors('numeroMiembros')}" th:errors="*{numeroMiembros}"></div>
            </div>

            <div class="actions">
                <button class="btn btn-primary" type="submit">Guardar</button>
                <a class="btn" th:href="@{/bandas}">Cancelar</a>
            </div>
        </form>
    </div>
</section>
</html>
