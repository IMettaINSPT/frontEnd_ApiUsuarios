<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout('Detalle Vigilante', ~{::section})}">

<section class="container">
    <h1>Detalle Vigilante</h1>

    <div class="card">
        <div class="card-title">Datos</div>
        <br>
        <p><b>Código:</b> <span th:text="${item.codigo}">VIG-01</span></p>
        <p><b>Edad:</b> <span th:text="${item.edad}">25</span> años</p>

        <p><b>Contratos Asignados:</b>
            <span th:each="contrato : ${item.contratos}"
                  th:text="${contrato.numContrato} + ' - '"
                  class="badge"
                  style="margin-right: 4px;">
                CON-01
            </span>

            <span th:if="${#lists.isEmpty(item.contratos)}" class="muted">Sin contratos asignados</span>

            <br>
            <small class="muted">(Para gestionar contratos, diríjase al menú de Contratos)</small>
        </p>
    </div>

    <div class="card" style="margin-top:16px;">
        <div class="card-title">
            <span sec:authorize="hasRole('ADMIN')">Editar</span>
            <span sec:authorize="hasRole('INVESTIGADOR')">📄 Ficha de Consulta</span>
        </div>
        <br>

        <div class="info-badge" sec:authorize="hasRole('INVESTIGADOR')"
             style="background: #e1f5fe; color: #01579b; padding: 12px; border-radius: 4px; margin-bottom: 15px; border: 1px solid #b3e5fc; font-weight: 500;">
            Usted está en modo lectura. Para solicitar cambios, contacte al administrador.
        </div>

        <form th:action="@{/vigilantes/{id}(id=${item.id})}" method="post" th:object="${update}" class="form">
            <div th:if="${#fields.hasGlobalErrors()}" class="error">
                <p th:each="e : ${#fields.globalErrors()}"
                   th:text="${e.defaultMessage}"></p>
            </div>

            <div>
                <label>Código</label>
                <input type="text" th:field="*{codigo}"
                       th:readonly="${#authorization.expression('hasRole(''INVESTIGADOR'')')}">
                <div class="error" th:if="${#fields.hasErrors('codigo')}" th:errors="*{codigo}"></div>
            </div>

            <div>
                <label>Edad</label>
                <input type="number" th:field="*{edad}"
                       th:readonly="${#authorization.expression('hasRole(''INVESTIGADOR'')')}">
                <div class="error" th:if="${#fields.hasErrors('edad')}" th:errors="*{edad}"></div>
            </div>



            <div class="actions">
                <button class="btn btn-primary" type="submit"
                        sec:authorize="hasRole('ADMIN')">Guardar cambios</button>

                <a class="btn" th:href="@{/vigilantes}">Volver</a>

                <a class="btn btn-danger" th:href="@{/vigilantes/{id}/confirm-delete(id=${item.id})}"
                   sec:authorize="hasRole('ADMIN')">Borrar</a>
            </div>
        </form>
    </div>
</section>
</html>
