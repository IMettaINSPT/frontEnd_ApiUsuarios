<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout('Crear Vigilante', ~{::section})}">

<section class="container">
    <h1>Crear Vigilante</h1>



        <div class="card">
            <form th:action="@{/vigilanes}" method="post" th:object="${form}" class="form">
                <div>
                    <label>Código
                        <input type="text" th:field="*{codigo}"></label>
                </div>

                <div>
                    <label>Edad</label>
                    <input type="text" th:field="*{edad}">
                </div>


                <div>
                    <label>Nro.de Contrato
                        <select th:field="*{contratoId}">
                            <option value="">-- Seleccionar --</option>
                            <option th:each="n : ${contratos}" th:value="${c.id}" th:text="${c.numContrato}">1</option>
                        </select></label>
                </div>

                <div class="actions">
                    <button class="btn btn-primary" type="submit">Guardar</button>
                    <a class="btn" th:href="@{/vigilantes}">Cancelar</a>
                </div>
            </form>
        </div>
    </section>
    </html>
