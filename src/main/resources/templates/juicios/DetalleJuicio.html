<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout('Detalle Juicio', ~{::section})}">

<section class="container">
    <h1>Detalle Juicio</h1>

    <div class="card">
        <p><b>ID:</b> <span th:text="${item.id}">1</span></p>
    </div>

    <div class="card" style="margin-top:16px;">
        <div class="card-title">Editar</div>
        <br>
        <form th:action="@{/juicios/{id}(id=${item.id})}" method="post" th:object="${update}" class="form">

            <div th:if="${#fields.hasGlobalErrors()}" class="error">
                <div th:each="e : ${#fields.globalErrors()}" th:text="${e}"></div>
            </div>

            <div>
                <label>Número de Expediente</label>
                <input type="text" th:field="*{expediente}">
                <div class="error" th:if="${#fields.hasErrors('expediente')}" th:errors="*{expediente}"></div>
            </div>

            <div>
                <label>Fecha juicio</label>
                <input type="date" th:field="*{fechaJuicio}" data-required>
                <div class="error" th:if="${#fields.hasErrors('fechaJuicio')}" th:errors="*{fechaJuicio}"></div>
            </div>

            <div>
                <label>Juez</label>
                <select th:field="*{juezId}" data-required>
                    <option value="">-- Seleccionar --</option>
                    <option th:each="j : ${jueces}"
                            th:value="${j.id}"
                            th:text="${j.claveJuzgado + ' - ' + j.apellido}">1</option>
                </select>
                <div th:if="${#fields.hasErrors('juezId')}"
                     th:text="${#fields.errors('juezId')[0]}" style="color:#ffb4b4;"></div>
            </div>

            <div>
                <label>Delito</label>
                <select th:field="*{asaltoId}" data-required>
                    <option value="">-- Seleccionar --</option>
                    <option th:each="a : ${asaltos}"
                            th:value="${a.id}"
                            th:text="${a.codigo + ' - ' + a.fecha}">1</option>
                </select>
                <div th:if="${#fields.hasErrors('asaltoId')}"
                     th:text="${#fields.errors('asaltoId')[0]}" style="color:#ffb4b4;"></div>
            </div>

            <div>
                <label>Detenido</label>
                <select th:field="*{personaDetenidaId}" data-required>
                    <option value="">-- Seleccionar --</option>
                    <option th:each="p : ${persona}"
                            th:value="${p.id}"
                            th:text="${p.codigo + ' - ' + p.apellido}">1</option>
                </select>
                <div th:if="${#fields.hasErrors('personaDetenidaId')}"
                     th:text="${#fields.errors('personaDetenidaId')[0]}" style="color:#ffb4b4;"></div>
            </div>

            <div>
                <label>Situación Penal</label>
                <select th:field="*{condenado}" id="situacionPenal" onchange="toggleCondena()">
                    <option value="">-- Seleccionar --</option>
                    <option th:value="true">Condenado</option>
                    <option th:value="false">Absuelto</option>
                </select>
                <div class="error" th:if="${#fields.hasErrors('condenado')}" th:errors="*{condenado}"></div>
            </div>

            <div id="seccion-condena" style="display: none; border-left: 4px solid #007bff; padding-left: 15px; margin-top: 10px;">
                <div>
                    <label>Fecha Inicio de Condena</label>
                    <input type="date" th:field="*{fechaInicioCondena}">
                    <div class="error" th:if="${#fields.hasErrors('fechaInicioCondena')}" th:errors="*{fechaInicioCondena}"></div>
                </div>

                <div>
                    <label>Tiempo de Condena (meses)</label>
                    <input type="number" th:field="*{tiempoCondenaMeses}" min="1">
                    <div class="error" th:if="${#fields.hasErrors('tiempoCondenaMeses')}" th:errors="*{tiempoCondenaMeses}"></div>
                </div>
            </div>

            <div class="actions">
                <button class="btn btn-primary" type="submit">Guardar cambios</button>
                <a class="btn" th:href="@{/juicios}">Volver</a>
                <a class="btn btn-danger" th:href="@{/juicios/{id}/confirm-delete(id=${item.id})}">Borrar</a>
            </div>
        </form>
    </div>

    <script th:inline="javascript">
        function toggleCondena() {
            const select = document.getElementById('situacionPenal');
            const seccion = document.getElementById('seccion-condena');
            // Verificamos si es el string "true" o el booleano true
            if (select.value === "true" || select.value === true) {
                seccion.style.display = 'block';
            } else {
                seccion.style.display = 'none';
            }
        }

        // EJECUCIÓN INICIAL: Fundamental en la edición
        // Esto hace que si el juicio ya era condenado, la sección se vea al abrir la página
        document.addEventListener("DOMContentLoaded", function() {
            toggleCondena();
        });
    </script>
</section>
</html>
