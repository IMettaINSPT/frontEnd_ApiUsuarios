<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout('Detalle Juicio', ~{::section})}">

<section class="container">
    <h1>Detalle Juicio</h1>

    <div class="card" style="margin-top:16px;">
        <div class="card-title">
            <span sec:authorize="hasRole('ADMIN')">Editar</span>
            <span sec:authorize="hasRole('INVESTIGADOR')">📄 Ficha de Consulta</span>
        </div>
        <br>

        <div class="info-badge" sec:authorize="hasRole('INVESTIGADOR')"
             style="background: #e1f5fe; color: #01579b; padding: 12px; border-radius: 4px; margin-bottom: 15px; border: 1px solid #b3e5fc; font-weight: 500;">
            Usted está en modo lectura. Para solicitar cambios, contacte al administrador.
        </div>

        <form th:action="@{/juicios/{id}(id=${item.id})}" method="post" th:object="${update}" class="form">

            <div th:if="${#fields.hasGlobalErrors()}" class="error">
                <div th:each="e : ${#fields.globalErrors()}" th:text="${e}"></div>
            </div>

            <div>
                <label>Número de Expediente</label>
                <input type="text" th:field="*{expediente}"
                       th:readonly="${#authorization.expression('hasRole(''INVESTIGADOR'')')}">
                <div class="error" th:if="${#fields.hasErrors('expediente')}" th:errors="*{expediente}"></div>
            </div>

            <div>
                <label>Delito (Asalto)</label>
                <select th:field="*{asaltoId}" id="asaltoId" data-required
                        th:disabled="${#authorization.expression('hasRole(''INVESTIGADOR'')')}">
                    <option value="">-- Seleccionar --</option>
                    <option th:each="a : ${asaltos}"
                            th:value="${a.id}"
                            th:text="${a.codigo + ' - ' + #temporals.format(a.fechaAsalto, 'dd/MM/yyyy')}">1</option>
                </select>
                <div th:if="${#fields.hasErrors('asaltoId')}"
                     th:text="${#fields.errors('asaltoId')[0]}" style="color:#ffb4b4;"></div>
            </div>

            <div>
                <label>Fecha juicio</label>
                <input type="date" th:field="*{fechaJuicio}" id="fechaJuicio" data-required
                       th:readonly="${#authorization.expression('hasRole(''INVESTIGADOR'')')}">
                <div class="error" th:if="${#fields.hasErrors('fechaJuicio')}" th:errors="*{fechaJuicio}"></div>
            </div>

            <div>
                <label>Juez</label>
                <select th:field="*{juezId}" data-required
                        th:disabled="${#authorization.expression('hasRole(''INVESTIGADOR'')')}">
                    <option value="">-- Seleccionar --</option>
                    <option th:each="j : ${jueces}"
                            th:value="${j.id}"
                            th:text="${j.claveJuzgado + ' - ' + j.apellido}">1</option>
                </select>
                <div th:if="${#fields.hasErrors('juezId')}"
                     th:text="${#fields.errors('juezId')[0]}" style="color:#ffb4b4;"></div>
            </div>

            <div>
                <label>Detenido</label>
                <select th:field="*{personaDetenidaId}" id="personaDetenidaId"
                        th:data-selected-id="${update.personaDetenidaId}" data-required
                        th:disabled="${#authorization.expression('hasRole(''INVESTIGADOR'')')}">
                    <option value="">-- Seleccione un delito primero --</option>
                </select>
                <div th:if="${#fields.hasErrors('personaDetenidaId')}"
                     th:text="${#fields.errors('personaDetenidaId')[0]}" style="color:#ffb4b4;"></div>
            </div>

            <div>
                <label>Situación Penal</label>
                <select th:field="*{condenado}" id="situacionPenal" onchange="toggleCondena()"
                        th:disabled="${#authorization.expression('hasRole(''INVESTIGADOR'')')}">
                    <option value="">-- Seleccionar --</option>
                    <option th:value="true">Condenado</option>
                    <option th:value="false">Absuelto</option>
                </select>
                <div class="error" th:if="${#fields.hasErrors('condenado')}" th:errors="*{condenado}"></div>
            </div>

            <div id="seccion-condena" style="display: none; border-left: 4px solid #007bff; padding-left: 15px; margin-top: 10px;">
                <div>
                    <label>Fecha Inicio de Condena</label>
                    <input type="date" th:field="*{fechaInicioCondena}" id="fechaInicioCondena"
                           th:readonly="${#authorization.expression('hasRole(''INVESTIGADOR'')')}">
                    <div class="error" th:if="${#fields.hasErrors('fechaInicioCondena')}" th:errors="*{fechaInicioCondena}"></div>
                </div>

                <div>
                    <label>Tiempo de Condena (meses)</label>
                    <input type="number" th:field="*{tiempoCondenaMeses}" min="1"
                           th:readonly="${#authorization.expression('hasRole(''INVESTIGADOR'')')}">
                    <div class="error" th:if="${#fields.hasErrors('tiempoCondenaMeses')}" th:errors="*{tiempoCondenaMeses}"></div>
                </div>
            </div>

            <div class="actions">
                <button class="btn btn-primary" type="submit"
                        sec:authorize="hasRole('ADMIN')">Guardar cambios</button>

                <a class="btn" th:href="@{/juicios}">Volver</a>

                <a class="btn btn-danger" th:href="@{/juicios/{id}/confirm-delete(id=${item.id})}"
                   sec:authorize="hasRole('ADMIN')">Borrar</a>
            </div>
        </form>
    </div>

    <script th:inline="javascript">
        const jwtToken = [[${session.JWT}]];
        const backendBaseUrl = [[${backendUrl}]];

        const inputFechaJuicio = document.getElementById('fechaJuicio');
        const inputFechaCondena = document.getElementById('fechaInicioCondena');
        const asaltoSelect = document.getElementById('asaltoId');

        function toggleCondena() {
            const select = document.getElementById('situacionPenal');
            const seccion = document.getElementById('seccion-condena');
            if (select.value === "true" || select.value === true) {
                seccion.style.display = 'block';
            } else {
                seccion.style.display = 'none';
            }
        }

        // Función para actualizar los límites .min de los calendarios
        function actualizarLimitesFechas() {
            const selectedOption = asaltoSelect.options[asaltoSelect.selectedIndex];
            if (!selectedOption || !selectedOption.value) return;

            // Extraer fecha del asalto del texto: "COD - 25/02/2026"
            const dateMatch = selectedOption.text.match(/(\d{2})\/(\d{2})\/(\d{4})/);
            if (dateMatch) {
                const [_, day, month, year] = dateMatch;
                const formattedDate = `${year}-${month}-${day}`;
                inputFechaJuicio.min = formattedDate;
            }

            // La condena no puede ser antes del juicio
            if (inputFechaJuicio.value) {
                inputFechaCondena.min = inputFechaJuicio.value;
            }
        }

        async function cargarPersonas(asaltoId, personaSeleccionadaId = null) {
            const personaSelect = document.getElementById('personaDetenidaId');
            if (!asaltoId) return;

            personaSelect.innerHTML = '<option value="">Cargando...</option>';

            try {
                const response = await fetch(`${backendBaseUrl}/asaltos/${asaltoId}/personas`, {
                    headers: { 'Authorization': `Bearer ${jwtToken}`, 'Accept': 'application/json' }
                });

                if (!response.ok) throw new Error("Error en red");
                const data = await response.json();

                personaSelect.innerHTML = '<option value="">-- Seleccionar --</option>';
                data.forEach(p => {
                    const option = document.createElement('option');
                    option.value = p.id;
                    option.textContent = `${p.codigo} - ${p.apellido} ${p.nombre}`;
                    if (personaSeleccionadaId && p.id == personaSeleccionadaId) {
                        option.selected = true;
                    }
                    personaSelect.appendChild(option);
                });
            } catch (error) {
                console.error("Error cargando personas:", error);
                personaSelect.innerHTML = '<option value="">Error al cargar datos</option>';
            }
        }

        asaltoSelect.addEventListener('change', function() {
            actualizarLimitesFechas();
            cargarPersonas(this.value);

            // Si cambian el asalto, validamos si la fecha de juicio actual quedó vieja
            if (inputFechaJuicio.value && inputFechaJuicio.value < inputFechaJuicio.min) {
                inputFechaJuicio.value = "";
                inputFechaCondena.value = "";
            }
        });

        inputFechaJuicio.addEventListener('change', function() {
            actualizarLimitesFechas();
            if (inputFechaCondena.value && inputFechaCondena.value < this.value) {
                inputFechaCondena.value = "";
            }
        });

        document.addEventListener("DOMContentLoaded", function() {
            toggleCondena();
            actualizarLimitesFechas();

            const asaltoInicial = asaltoSelect.value;
            const personaActualId = document.getElementById('personaDetenidaId').getAttribute('data-selected-id');
            if (asaltoInicial) {
                cargarPersonas(asaltoInicial, personaActualId);
            }
        });
    </script>
</section>
</html>
