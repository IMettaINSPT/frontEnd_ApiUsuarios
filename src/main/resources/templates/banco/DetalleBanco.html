<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout('Detalle Banco', ~{::section})}">

<section class="container">
    <h1>Detalle Banco</h1>

    <div class="card">
        <div class="card-title">Datos</div>
        <br>
        <p><b>Código:</b> <span th:text="${item.codigo}">BAN-01</span></p>
        <p><b>Domicilio central:</b> <span th:text="${item.domicilioCentral}">CABA</span></p>
        <p><b>Sucursales Asignadas:</b>
            <span th:each="sucursal : ${item.sucursales}"
                  th:text="${sucursal.codigo}+ ' - '"
                  class="badge"
                  style="margin-right: 4px;">
        SUC-01
            </span>

            <span th:if="${#lists.isEmpty(item.sucursales)}" class="muted">Sin sucursales asignadas</span>

            <br>
            <small class="muted">(Para gestionar sucursales, diríjase al menú de Sucursales)</small>
        </p>


    </div>

    <div class="card" style="margin-top:16px;">
        <div class="card-title">
            <span sec:authorize="hasRole('ADMIN')">Editar</span>
            <span sec:authorize="hasRole('INVESTIGADOR')">📄 Ficha de Consulta</span>
        </div>
        <br>

        <div class="info-badge" sec:authorize="hasRole('INVESTIGADOR')"
             style="background: #e1f5fe; color: #01579b; padding: 12px; border-radius: 4px; margin-bottom: 15px; border: 1px solid #b3e5fc; font-weight: 500;">
            Usted está en modo lectura. Para solicitar cambios, contacte al administrador.
        </div>

        <form th:action="@{/bancos/{id}(id=${item.id})}" method="post" th:object="${update}" class="form">
            <div th:if="${#fields.hasGlobalErrors()}" class="error">
                <div th:each="e : ${#fields.globalErrors()}" th:text="${e}"></div>
            </div>

            <div>
                <label>Código</label>
                <input type="text" th:field="*{codigo}"
                       th:readonly="${#authorization.expression('hasRole(''INVESTIGADOR'')')}">
                <div class="error" th:if="${#fields.hasErrors('codigo')}" th:errors="*{codigo}"></div>
            </div>

            <div>
                <label>Domicilio central</label>
                <input type="text" th:field="*{domicilioCentral}"
                       th:readonly="${#authorization.expression('hasRole(''INVESTIGADOR'')')}">
                <div class="error" th:if="${#fields.hasErrors('domicilioCentral')}" th:errors="*{domicilioCentral}"></div>
            </div>



            <div class="actions">
                <button class="btn btn-primary" type="submit"
                        sec:authorize="hasRole('ADMIN')">Guardar cambios</button>
                <a class="btn" th:href="@{/bancos}">Volver</a>
                <a class="btn btn-danger" th:href="@{/bancos/{id}/confirm-delete(id=${item.id})}"
                   sec:authorize="hasRole('ADMIN')">Borrar</a>
            </div>
        </form>
    </div>
</section>
</html>
