<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout('Borrar Usuario', ~{::section})}">

<section class="container">
    <h1>Confirmar borrado</h1>

    <div class="card">
        <p>¿Seguro querés borrar el Usuario con Código Nro: <b th:text="${user.codigo}">CODIGO</b>?</p>

        <p th:if="${deleteError != null}" class="error" th:text="${deleteError}"></p>

        <form th:action="@{/users/{id}/delete(id=${user.id})}" method="post" class="actions">
            <button class="btn btn-danger" type="submit">Sí, borrar</button>
            <a class="btn" th:href="@{/users}">Cancelar</a>
        </form>
    </div>
</section>
</html>
