<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout('Detalle Contrato', ~{::section})}">

<section class="container">
    <h1>Detalle Contrato</h1>

    <div class="card">
        <div class="card-title">Editar</div>
        <br>
        <form th:action="@{/contratos/{id}(id=${item.id})}" method="post" th:object="${update}" class="form">

            <div th:if="${#fields.hasGlobalErrors()}" class="error">
                <div th:each="e : ${#fields.globalErrors()}" th:text="${e}"></div>
            </div>

            <div>
                <label>Fecha contrato</label>
                <input type="date" th:field="*{fechaContrato}" id="fechaInicio">
                <div class="error" th:if="${#fields.hasErrors('fechaContrato')}" th:errors="*{fechaContrato}"></div>
            </div>
            <div>
                <label>Fecha fin (opcional)</label>
                <input type="date"
                       id="fechaFin"
                       name="fechaFin"
                       th:value="${update.fechaFin}">
                <div class="error" th:if="${#fields.hasErrors('fechaFin')}" th:errors="*{fechaFin}"></div>
                <div class="form-text muted">Si queda vacío, el contrato se considera activo indefinidamente.</div>
            </div>
            <div>
                <label>Con arma</label>
                <select th:field="*{conArma}">
                    <option th:value="true">SI</option>
                    <option th:value="false">NO</option>
                </select>
                <div class="error" th:if="${#fields.hasErrors('conArma')}" th:errors="*{conArma}"></div>
            </div>

            <div>
                <label>Sucursal</label>
                <select th:field="*{sucursalId}">
                    <option value="">-- Seleccionar --</option>
                    <option th:each="s : ${sucursales}" th:value="${s.id}" th:text="${s.codigo}">1</option>
                </select>
                <div class="error" th:if="${#fields.hasErrors('sucursalId')}" th:errors="*{sucursalId}"></div>
            </div>

            <div>
                <label>Vigilante</label>
                <select th:field="*{vigilanteId}">
                    <option value="">-- Seleccionar --</option>
                    <option th:each="v : ${vigilantes}" th:value="${v.id}" th:text="${v.codigo}">1</option>
                </select>
                <div class="error" th:if="${#fields.hasErrors('vigilanteId')}" th:errors="*{vigilanteId}"></div>
            </div>

            <div class="actions">
                <button class="btn btn-primary" type="submit">Guardar cambios</button>
                <a class="btn" th:href="@{/contratos}">Volver</a>
                <a class="btn btn-danger" th:href="@{/contratos/{id}/confirm-delete(id=${item.id})}">Borrar</a>
            </div>
        </form>
    </div>

    <script th:inline="javascript">
        const inputInicio = document.getElementById('fechaInicio');
        const inputFin = document.getElementById('fechaFin');

        function sincronizarFechas() {
            if (inputInicio.value) {
                // Establece el mínimo permitido para la fecha de fin
                inputFin.min = inputInicio.value;

                // Si al cambiar el inicio, la fecha fin queda fuera de rango, se limpia
                if (inputFin.value && inputFin.value < inputInicio.value) {
                    inputFin.value = "";
                }
            } else {
                inputFin.min = "";
            }
        }

        // Escuchar cambios mientras el usuario edita
        inputInicio.addEventListener('change', sincronizarFechas);

        // Ejecutar al cargar la página para aplicar la restricción con los datos actuales
        window.onload = sincronizarFechas;
    </script>
</section>
</html>
